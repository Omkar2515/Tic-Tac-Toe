<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tic Tac Toe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ================= AUTH MODAL (VISIBLE BY DEFAULT) ================= -->
<div id="authModal" class="modal">
  <div class="modal-box">
    <h2>Welcome 👋</h2>

    <input id="authUsername" type="text" placeholder="Username" />
    <input id="authPassword" type="password" placeholder="Password" />

    <button id="loginBtn">Login</button>
    <button id="registerBtn">New User</button>

    <p id="authError" class="error"></p>
  </div>
</div>

<!-- ================= GAME UI (HIDDEN INITIALLY) ================= -->
<div id="gameUI" class="game hidden">

  <h2>Tic Tac Toe</h2>

  <select id="mode">
    <option value="online">Online Multiplayer</option>
    <option value="offline">Player vs Player</option>
    <option value="ai">Player vs AI</option>
  </select>

  <p id="inviteBox" class="invite hidden"></p>

  <div id="board" class="board"></div>

  <div class="score">
    <span id="xScore">0</span> : <span id="oScore">0</span>
  </div>

  <p id="status"></p>

  <div class="buttons">
    <button id="restartBtn">Restart</button>
    <button id="clearScoreBtn">Clear Score</button>
    <button id="highScoreBtn">High Score</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="js/main.js"></script>

</body>
</html>
